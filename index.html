<meta charset="UTF-8">
<title>Retro Geeks</title>

<meta property="og:title" content="Retro Geeks">
<meta property="og:description" content="Retro Geeks hardware base">
<meta property="og:image" content="https://github.com/prostoypatsan15retro/Retro-Geeks/blob/main/preview.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://prostopatsan15retro.github.io/Retro-Geeks/">

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
}

header {
    background: #2b2b2b;
    padding: 14px 25px;
    font-size: 28px;
    font-weight: bold;
}

main {
    padding: 25px;
}

a {
    color: #5ec7ff;
    cursor: pointer;
    text-decoration: none;
}

input {
    width: 60%;
    padding: 13px;
    background: #333;
    color: white;
    border: 1px solid #555;
    border-radius: 6px;
    font-size: 17px;
}

.section-menu {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.section-btn {
    padding: 12px 18px;
    background: #222;
    color: white;
    border: 1px solid #555;
    cursor: pointer;
    font-size: 16px;
}

.section-btn.active {
    color: #5ec7ff;
    border-color: #5ec7ff;
    background: #2d2d2d;
}

.grid {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 15px;
}

.card {
    background: #1d1d1d;
    border: 1px solid #68bfff;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 170px;
    object-fit: cover;
    background: #333;
}

.card div {
    padding: 12px;
}

.card h3 {
    color: #5ec7ff;
    margin: 0 0 10px;
}

.board-page {
    display: none;
}

.back {
    margin-bottom: 20px;
    display: inline-block;
}

.board-layout {
    display: flex;
    gap: 25px;
}

.board-photo {
    width: 420px;
    background: #222;
    padding: 10px;
}

.board-photo img {
    width: 100%;
    cursor: zoom-in;
}

.viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.viewer img {
    max-width: 90%;
    max-height: 90%;
}

.close-viewer {
    position: absolute;
    top: 20px;
    right: 35px;
    color: white;
    font-size: 34px;
    cursor: pointer;
}

.content {
    flex: 1;
}

.tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 0;
}

.tab {
    padding: 14px 18px;
    background: #222;
    border: 1px solid #555;
    cursor: pointer;
}

.tab.active {
    border-color: #70c8ff;
    background: #2d2d2d;
}

.panel {
    background: #1b1b1b;
    padding: 20px;
    border-top: 1px solid #444;
    min-height: 300px;
}

.info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 50px;
}

.info-item b {
    color: #ddd;
}

.tag {
    border: 1px solid #666;
    padding: 3px 7px;
    border-radius: 4px;
    color: #65c8ff;
}

.file-link {
    display: block;
    margin: 10px 0;
}
</style>
</head>

<body>

<header>Retro Geeks</header>

<main>

<section id="catalog">

    <input id="search" oninput="renderCatalog()" placeholder="Name, chipset, socket, manufacturer...">

    <div class="section-menu" id="sectionMenu"></div>

    <div class="grid" id="cards"></div>
</section>

<section id="boardPage" class="board-page">
    <a class="back" onclick="showCatalog()">← Back to catalog</a>

    <h1 id="boardTitle"></h1>

    <div class="board-layout">
        <div class="board-photo">
            <img id="boardImage" onclick="openViewer(this.src)">
            <p id="boardImageCaption"></p>
        </div>

        <div class="content">
            <div class="tabs" id="tabs">
                <div class="tab active" onclick="openTab('description')">Description</div>
                <div class="tab" onclick="openTab('chips')">Chips</div>
                <div class="tab" onclick="openTab('bios')">BIOS</div>

                <div class="tab" onclick="openTab('logs')">Logs</div>
            </div>

            <div class="panel" id="panel"></div>

    </div>
</section>

</main>

let currentSectionId = "motherboards";
let currentBoard = null;
let currentGenericItem = null;

function getCurrentSection() {
    return sections.find(section => section.id === currentSectionId);
}

function renderSectionMenu() {
    const menu = document.getElementById("sectionMenu");
    menu.innerHTML = "";

    sections.forEach(section => {
        menu.innerHTML += `
            <button class="section-btn ${section.id === currentSectionId ? "active" : ""}" onclick="changeSection('${section.id}')">
                ${section.title}
            </button>
        `;
    });
}

function changeSection(sectionId) {
    currentSectionId = sectionId;
    renderCatalog();
}

function renderCatalog() {
    renderSectionMenu();

    const search = document.getElementById("search").value.toLowerCase();
    const cards = document.getElementById("cards");
    const section = getCurrentSection();

    cards.innerHTML = "";

    section.items
        .filter(item => {
            let text = item.name + " " + item.manufacturer;

            if (section.type === "motherboard") {
                text += " " + item.chipset + " " + item.socket + " " + item.ramType;
            } else {
                text += " " + Object.values(item.info).join(" ");
            }

            return text.toLowerCase().includes(search);
        })
        .forEach(item => {
            let cardInfo = "";

            if (section.type === "motherboard") {
                cardInfo = `
                    <p><b>Socket:</b> ${item.socket}</p>
                    <p><b>Chipset:</b> ${item.chipset}</p>
                    <p><b>RAM:</b> ${item.ramType}</p>
                `;
            } else {
                cardInfo = Object.entries(item.info).map(([key, value]) => {
                    return `<p><b>${key}:</b> ${value}</p>`;
                }).join("");
            }

            const action = section.type === "motherboard"
                ? `openBoard(${item.id})`
                : `openGenericItem('${section.id}', '${item.id}')`;

            cards.innerHTML += `
                <div class="card" onclick="${action}">
                    <img src="${item.image}">
                    <div>
                        <h3>${item.name}</h3>
                        ${cardInfo}
                    </div>
                </div>
            `;
        });
}

function openBoard(id) {
    const section = sections.find(section => section.id === "motherboards");
    currentBoard = section.items.find(board => board.id === id);
    currentGenericItem = null;

    document.getElementById("catalog").style.display = "none";
    document.getElementById("boardPage").style.display = "block";
    document.getElementById("tabs").style.display = "flex";

    document.getElementById("boardTitle").innerText = currentBoard.name;
    document.getElementById("boardImage").src = currentBoard.image;
    document.getElementById("boardImageCaption").innerText = "Image of " + currentBoard.name;

    openTab("description");
}

function openGenericItem(sectionId, itemId) {
    const section = sections.find(section => section.id === sectionId);
    currentGenericItem = section.items.find(item => item.id === itemId);
    currentBoard = null;

    document.getElementById("catalog").style.display = "none";
    document.getElementById("boardPage").style.display = "block";
    const tabs = document.getElementById("tabs");

// скрываем лишние вкладки
    tabs.children[1].style.display = "none"; // Chips

    tabs.style.display = "flex";

    document.getElementById("boardTitle").innerText = currentGenericItem.name;
    document.getElementById("boardImage").src = currentGenericItem.image;
    document.getElementById("boardImageCaption").innerText = "Image of " + currentGenericItem.name;

    const p = document.getElementById("panel");

    p.innerHTML = `
        <h3>Description</h3>
        <div class="info-grid">
            ${Object.entries(currentGenericItem.info).map(([key, value]) => `
                <div class="info-item">
                    <b>${key}:</b> <span class="tag">${value}</span>
                </div>
            `).join("")}
        </div>
    `;
}

function showCatalog() {
    document.getElementById("catalog").style.display = "block";
    document.getElementById("boardPage").style.display = "none";
}

function openTab(tabName) {
    if (currentGenericItem) {
    const p = document.getElementById("panel");

    if (tabName === "description") {
        p.innerHTML = `
            <div class="info-grid">
                ${Object.entries(currentGenericItem.info).map(([key, value]) => `
                    <div class="info-item">
                        <b>${key}:</b> <span class="tag">${value}</span>
                    </div>
                `).join("")}
            </div>
        `;
    }

    if (tabName === "bios") {
        p.innerHTML = `<h3>BIOS</h3>`;
    }

    if (tabName === "drivers") {
        p.innerHTML = `<h3>Drivers</h3>`;
    }

    if (tabName === "docs") {
        p.innerHTML = `<h3>Documentation</h3>`;
    }

    if (tabName === "logs") {
        p.innerHTML = `<h3>Logs</h3>`;
    }

    return;
}

    if (!currentBoard) return;

    document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));

    const tabs = document.querySelectorAll(".tab");
    tabs.forEach(tab => {
        if (tab.innerText.toLowerCase().startsWith(tabName)) {
            tab.classList.add("active");
        }
    });

    const p = document.getElementById("panel");

    if (tabName === "description") {
        p.innerHTML = `
            <div class="info-grid">
                <div class="info-item"><b>Chipset:</b> <span class="tag">${currentBoard.chipset}</span></div>
                <div class="info-item"><b>Max RAM size:</b> <span class="tag">${currentBoard.maxRam}</span></div>
                <div class="info-item"><b>Socket:</b> <span class="tag">${currentBoard.socket}</span></div>
                <div class="info-item"><b>RAM type:</b> <span class="tag">${currentBoard.ramType}</span></div>
                <div class="info-item"><b>FSB speeds:</b> ${currentBoard.fsb}</div>
                <div class="info-item"><b>PSU connector:</b> <span class="tag">${currentBoard.psu}</span></div>
                <div class="info-item"><b>Form factor:</b> ${currentBoard.formFactor}</div>
                <div class="info-item"><b>Dimensions:</b> ${currentBoard.dimensions}</div>
            </div>

            <hr>

            <h3>I/O ports</h3>
            <ul>${currentBoard.ports.map(x => `<li>${x}</li>`).join("")}</ul>

            <h3>Expansion slots</h3>
            <ul>${currentBoard.slots.map(x => `<li>${x}</li>`).join("")}</ul>
        `;
    }

    if (tabName === "chips") {
        p.innerHTML = `
            <div class="inner-section">
                <h3>Chips</h3>
                <ul>
                    ${currentBoard.chips.map(x => `<li>${x}</li>`).join("")}
                </ul>
            </div>

            <hr>

            <div class="inner-section">
                <h3>CPU family support</h3>
                <ul>
                    ${currentBoard.cpu.map(x => `<li>${x}</li>`).join("")}
                </ul>
            </div>
        `;
    }

    if (tabName === "bios") {
        p.innerHTML = `<h3>BIOS</h3>` + currentBoard.bios.map(x =>
            `<a class="file-link" href="${x.link}" download>${x.name}</a>`
        ).join("");
    }

    if (tabName === "drivers") {
        p.innerHTML = `<h3>Drivers</h3>` + currentBoard.drivers.map(x =>
            `<a class="file-link" href="${x.link}" download>${x.name}</a>`
        ).join("");
    }

    if (tabName === "docs") {
        p.innerHTML = `<h3>Documentation</h3>` + currentBoard.docs.map(x =>
            `<a class="file-link" href="${x.link}" download>${x.name}</a>`
        ).join("");
    }

    if (tabName === "logs") {
        p.innerHTML = `<h3>Logs</h3><ul>${currentBoard.logs.map(x => `<li>${x}</li>`).join("")}</ul>`;
    }
}

function openViewer(src) {
    document.getElementById("viewerImg").src = src;
    document.getElementById("imageViewer").style.display = "flex";
}

function closeViewer() {
    document.getElementById("imageViewer").style.display = "none";
}

function closeViewerByBackground(event) {
    if (event.target.id === "imageViewer") {
        closeViewer();
    }
}

document.addEventListener("keydown", function(event) {
    if (event.key === "Escape") {
        closeViewer();
    }
});

renderCatalog();
</script>

<div id="imageViewer" class="viewer" onclick="closeViewerByBackground(event)">
    <span class="close-viewer" onclick="closeViewer()">✖</span>
    <img id="viewerImg">
</div>

</body>
</html>
